name: Bug report
description: Report a non-security bug. (For vulnerabilities, see SECURITY.md — do NOT use this form.)
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Security vulnerability?** Stop — do not file it here. Follow [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. blindkey ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Platform
      options: [Linux, macOS, Windows, Other]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste any error output. **Redact all secrets first.**
      render: shell
