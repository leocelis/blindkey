name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. Who is helped and how?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: |
        How does this affect the threat model or the constraints in vault_intent.yaml?
        Could it introduce a plaintext leak, a new attack surface, or weaken a guarantee?
  - type: checkboxes
    id: alignment
    attributes:
      label: Alignment
      options:
        - label: This is consistent with the project's non-goals (see ROADMAP.md / vault_intent.yaml)
