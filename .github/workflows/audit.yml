name: Security Audit

on:
  push:
    branches: [main]
    paths: ["**/Cargo.toml", "**/Cargo.lock", "deny.toml", ".github/workflows/audit.yml"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly — catch newly-disclosed advisories (constraint C24)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (advisories + licenses + bans + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
