# Publish the workspace crates to crates.io on a published GitHub Release, in dependency order.
#
# Uses crates.io Trusted Publishing (OIDC) — no long-lived API token stored in the repo. This
# requires a ONE-TIME maintainer setup on crates.io: for each crate, add a Trusted Publisher
# pointing at leocelis/blindkey + this workflow. (The very first publish of a brand-new crate
# name may need a one-time `cargo login` + `cargo publish` to claim it; afterwards OIDC takes
# over.) See docs/RELEASE.md and docs/CRATES_IO_TRUSTED_PUBLISHING.md.
name: Publish crates

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - uses: rust-lang/crates-io-auth-action@e919bc7605cde86df457cf5b93c5e103838bd879 # v1.0.1
        id: auth
      - name: Publish in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          for crate in blindkey-sys blindkey-core blindkey-hardware blindkey-clip blindkey-agent blindkey-cli; do
            echo "::group::publish $crate"
            cargo publish --locked -p "$crate"
            echo "::endgroup::"
            # let the index settle so the next crate resolves the just-published dep
            sleep 30
          done
