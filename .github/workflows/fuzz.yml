# Scheduled fuzz smoke — runs each libFuzzer target for a short bounded time against the
# untrusted-input parsers (header, stanza, block-stream, payload, file-archive, vault-open).
# This is a smoke check, not a long fuzzing campaign; failures (a panic/hang/OOM on arbitrary
# bytes) open real bugs. Nightly toolchain is required by cargo-fuzz.
name: Fuzz smoke

on:
  schedule:
    - cron: "17 3 * * *" # daily 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [header_parse, stanza_parse, block_stream, payload_parse, file_archive_parse, vault_open, keepassxc_csv]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-fuzz
      - run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=60
        working-directory: fuzz
