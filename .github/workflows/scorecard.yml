# OpenSSF Scorecard — automated supply-chain / project-health scoring. Publishes results to
# the Scorecard dashboard and (optionally) the code-scanning tab; the score backs a public
# badge that security-tool evaluators check. Read-mostly; needs id-token to publish results.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 4 * * 1" # weekly, Monday 04:27 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@ff5dd8929f96a8a4dc67d13f32b8c75057829621 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Findings upload to the repo's Security tab (code scanning). Public-badge publishing
          # to the OpenSSF API is disabled until the project is registered there — it fails for
          # a brand-new repo and would red the workflow. Flip to true once registered.
          publish_results: false
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          sarif_file: results.sarif
