# CI — mirrors `just check` across every platform Blindkey ships a binary for, plus the
# supply-chain and reproducible-build gates that `just audit-ready` runs before a release.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  # Windows: Blindkey is Unix-first. The agent broker (blindkey-agent) is Unix-socket
  # only (a compile_error! guards non-Unix), and the CLI depends on it, so the full
  # workspace does not build on Windows yet. This job gives real Windows signal for the
  # PORTABLE security core (crypto, format, memory-hardening stubs, hardware, clipboard),
  # which must be correct on every platform. mlock/RLIMIT_CORE degrade to documented
  # cfg(not(unix)) no-ops in blindkey-sys.
  check-windows-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p blindkey-core -p blindkey-sys -p blindkey-clip -p blindkey-hardware --all-features

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,cargo-vet
      - run: cargo audit
      - run: cargo deny check
      - run: cargo vet

  reproducible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/reproducible-build.sh
