# CI — mirrors `just check` across every platform Blindkey ships a binary for, plus the
# supply-chain, coverage, MSRV, and reproducible-build gates. Actions are pinned to commit
# SHAs (OpenSSF Scorecard hardening); the trailing comment tracks the human-readable version.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  # Windows: Blindkey is Unix-first. The agent broker (blindkey-agent) is Unix-socket
  # only (a compile_error! guards non-Unix), and the CLI depends on it, so the full
  # workspace does not build on Windows yet. This job gives real Windows signal for the
  # PORTABLE security core (crypto, format, memory-hardening stubs, hardware, clipboard),
  # which must be correct on every platform. mlock/RLIMIT_CORE degrade to documented
  # cfg(not(unix)) no-ops in blindkey-sys.
  check-windows-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - run: cargo test -p blindkey-core -p blindkey-sys -p blindkey-clip -p blindkey-hardware --all-features

  # MSRV — the minimum supported Rust version claimed in Cargo.toml (rust-version) and
  # rust-toolchain.toml must actually build the workspace.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - run: cargo build --workspace --all-features --locked

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-audit,cargo-deny,cargo-vet
      - run: cargo audit
      - run: cargo deny check
      - run: cargo vet

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
          components: llvm-tools-preview
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      # Coverage of the security core (crypto/format/memory/sealed); prints a summary to the
      # job log and writes an lcov file. Non-gating for now — it reports, it does not fail CI.
      - run: cargo llvm-cov --workspace --all-features --summary-only

  reproducible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@aa7c1c80a07a27a84c0aa76d0cef0aad3830e330 # v2.7.8
      - run: ./scripts/reproducible-build.sh
