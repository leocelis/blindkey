# cargo-deny configuration — supply-chain policy (constraints C3, C24).
# Run: `cargo deny check`  (advisories + licenses + bans + sources)

[advisories]
version = 2
# CI fails on any unresolved advisory in the dependency tree.
yanked = "deny"
# Documented exemptions. Each entry states WHY the advisory is not reachable in
# Blindkey's threat model — see docs/SUPPLY_CHAIN.md for the full rationale and
# review cadence. Exemptions are scoped to a single RUSTSEC ID, never blanket.
ignore = [
    # RUSTSEC-2026-0194 / -0195: quick-xml <0.41 memory-exhaustion / quadratic
    # attribute parsing on MALICIOUS XML. Not reachable: quick-xml is pulled only
    # by `wayland-scanner` (a BUILD-TIME proc-macro) to parse the trusted, vendored
    # Wayland protocol XML into Rust bindings — never runtime or untrusted input.
    # It reaches only `blindkey-gui` on Linux/Wayland; the security core, CLI, and
    # `blindkey-sys` never depend on it. No upstream fix exists: wayland-scanner at
    # its latest release (0.31.10) still pins quick-xml 0.39. Re-check when the
    # Wayland crates bump quick-xml to >=0.41, then drop these two lines.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # RUSTSEC-2024-0436 (paste) / RUSTSEC-2026-0192 (ttf-parser): "no longer
    # maintained" notices (not vulnerabilities). Both are desktop-GUI-only
    # transitive crates (egui text rendering / proc-macro helper), outside the
    # security boundary — the CLI and security core do not pull them. Tracked in
    # docs/SUPPLY_CHAIN.md; revisit whenever the GUI stack is upgraded.
    "RUSTSEC-2024-0436",
    "RUSTSEC-2026-0192",
]

[licenses]
version = 2
# Permissive / weak-copyleft, OSI-approved licenses only (constraint C24). The
# BSL-1.0, Zlib, and MPL-2.0 entries cover desktop-GUI transitive deps only
# (clipboard-win, error-code, foldhash, slotmap, nucleo-matcher); all are
# permissive or file-scoped-copyleft and impose no obligation on Blindkey's own
# MIT/Apache-2.0 source. See docs/SUPPLY_CHAIN.md.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSL-1.0",   # Boost Software License — permissive (clipboard-win, error-code)
    "Zlib",      # zlib License — permissive (foldhash, slotmap)
    "MPL-2.0",   # Mozilla Public License — file-scoped copyleft, dep-only (nucleo-matcher)
]
confidence-threshold = 0.93

[bans]
# Keep the trusted surface small; flag duplicate versions and risky crates.
multiple-versions = "warn"
wildcards = "deny"
# Disallow crates that pull in heavy/old C TLS or unaudited crypto into the core path.
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Only crates.io by default.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
