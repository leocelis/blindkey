# cargo-deny configuration — supply-chain policy (constraints C3, C24).
# Run: `cargo deny check`  (advisories + licenses + bans + sources)

[advisories]
version = 2
# CI fails on any unresolved advisory in the dependency tree.
yanked = "deny"
# Documented exemptions. Each entry states WHY the advisory is not reachable in
# Blindkey's threat model — see docs/SUPPLY_CHAIN.md for the full rationale and
# review cadence. Exemptions are scoped to a single RUSTSEC ID, never blanket.
ignore = [
    # RUSTSEC-2026-0194 / -0195: quick-xml <0.41 memory-exhaustion / quadratic
    # attribute parsing on MALICIOUS XML. Not reachable: quick-xml is pulled only
    # by `wayland-scanner` (a BUILD-TIME proc-macro) to parse the trusted, vendored
    # Wayland protocol XML into Rust bindings — never runtime or untrusted input.
    # It reaches only `blindkey-gui` on Linux/Wayland; the security core, CLI, and
    # `blindkey-sys` never depend on it. No upstream fix exists: wayland-scanner at
    # its latest release (0.31.10) still pins quick-xml 0.39. Re-check when the
    # Wayland crates bump quick-xml to >=0.41, then drop these two lines.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
# Only permissive, audit-friendly licenses (constraint C24).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.93

[bans]
# Keep the trusted surface small; flag duplicate versions and risky crates.
multiple-versions = "warn"
wildcards = "deny"
# Disallow crates that pull in heavy/old C TLS or unaudited crypto into the core path.
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Only crates.io by default.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
